<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        div{
            font-size: 20px;
        }
        h1{
            font-size: 1em;
            
        }
        div p:nth-last-child(2){
            font-size: 2em;
        }
        div p:last-of-type{
            font-size: 3em;
        }
      
    </style>
</head>
<body>
    <div>
        <h1>Hello Everyone</h1>
        <p>this is para 1</p>
        <p>this is para 2</p>
    </div>
    
</body>
</html>
