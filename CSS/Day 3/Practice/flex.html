<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        .container{
            height: 500px;
            width: 500px;
           background-color: bisque;
            display: flex;
            
        }

        .item{
            width: 100px;
            height: 100px;
            text-align: center;
            background-color: rgb(255, 125, 125);
            border: 5px solid brown;
            border-radius: 20px;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="item1 item">Static</div>
        <div class="item2 item">Relative</div>
        <div class="item3 item">Absolute</div>
        <div class="item4 item">Sticky</div>
        <div class="item5 item">Fixed</div>
    </div>

</body>
</html>
