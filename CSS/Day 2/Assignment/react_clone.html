<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React v19.2 Pixel Perfect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #23272f;
            color: #f6f7f9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .nav-fluid {
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px; /* Exact edge distance */
            background-color: #23272f;
            border-bottom: 1px solid #343a46;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        /* The Search Bar is much longer in your screenshot */
        .search-bar {
            background-color: #343a46;
            flex-grow: 1;
            max-width: 680px; /* Adjusted to match the visual ratio in your image */
            height: 40px;
            border-radius: 20px;
            margin-left: 15px;
            display: flex;
            align-items: center;
            padding: 0 16px;
        }

        .search-text {
            color: #99a1b3;
            font-size: 16px;
            margin-left: 10px;
        }

        .shortcut-key {
            background-color: #23272f;
            border: 1px solid #404756;
            border-radius: 5px;
            padding: 2px 8px;
            color: #99a1b3;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Right Nav Items - extremely tight spacing */
        .right-nav {
            display: flex;
            align-items: center;
            gap: 24px; /* Space between text links */
            margin-left: auto;
            padding-left: 20px;
        }

        .icon-group {
            display: flex;
            align-items: center;
            gap: 18px; /* High-density spacing for icons */
            margin-left: 20px;
        }

        .nav-link {
            font-size: 15px;
            font-weight: 500;
            color: #f6f7f9;
            text-decoration: none;
        }

        /* Brightness & Color Correction */
        .bright-icon {
            color: #f6f7f9;
            opacity: 1; /* Maximum brightness */
        }

        .react-blue { color: #149eca; }
    </style>
</head>
<body>

    <header class="nav-fluid">
        <div class="flex items-center">
            <svg width="32" height="32" viewBox="-10.5 -9.45 21 18.9" fill="none" class="react-blue">
                <circle cx="0" cy="0" r="2" fill="currentColor"></circle>
                <g stroke="currentColor" stroke-width="1" fill="none">
                    <ellipse rx="10" ry="4.5"></ellipse>
                    <ellipse rx="10" ry="4.5" transform="rotate(60)"></ellipse>
                    <ellipse rx="10" ry="4.5" transform="rotate(120)"></ellipse>
                </g>
            </svg>
            <span class="ml-2 text-[14px] text-[#99a1b3] font-medium">v19.2</span>
        </div>

        <div class="search-bar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#99a1b3" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <span class="search-text">Search</span>
            <div class="ml-auto flex gap-1">
                <div class="shortcut-key">⌘</div>
                <div class="shortcut-key">K</div>
            </div>
        </div>

        <div class="right-nav">
            <a href="#" class="nav-link">Learn</a>
            <a href="#" class="nav-link">Reference</a>
            <a href="#" class="nav-link">Community</a>
            <a href="#" class="nav-link">Blog</a>

            <div class="icon-group">
                <button class="bright-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
                    </svg>
                </button>

                <button class="bright-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m5 8 6 6"></path>
                        <path d="m4 14 6-6 2-3"></path>
                        <path d="M2 5h12"></path>
                        <path d="M7 2h1"></path>
                        <path d="m22 22-5-10-5 10"></path>
                        <path d="M14 18h6"></path>
                    </svg>
                </button>

                <a href="#" class="bright-icon">

                    </svg>
                </a>
            </div>
        </div>
    </header>

</body>
</html>
