<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            margin: 5px;
            border: 6px solid rgb(127, 95, 95);
            padding: 9px ;
            height: 200px;
            width: 300px;

        }
        .box1{
            box-sizing: border-box;
            background-color: grey;
        }

        .box2{
            box-sizing: content-box;
            background-color: antiquewhite;
        }
    </style>
</head>
<body>
    <div class="box1 box">
        <h1>box1</h1>
    </div>

    <div class =" box2 box">
        <h1>box2</h1>
    </div>

</body>
</html>
