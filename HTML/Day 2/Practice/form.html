<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="username">Username</label>
        <input type="text" name="username" required id="username"><br><br>
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="password"> <br><br>

        <label for ="email">Email</label>
        <input type="email" name="email" id="email"> <br><br>

        Gender: <br>
        <label for="male">Male</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="female">Female</label>
        <input type="radio" id="female" name="gender" value="female">
        
        Skills:
        <label for="skills">HTML</label>
        <input type="checkbox" id="skills" name="skills" value="html" > 
        
        <label for="css">CSS</label>
        <input type="checkbox" id="css" name="skills" value="css" > <br><br>

        Country:
        <select name="country">
            <option value="India" selected >India</option>
            <option value="USA">USA</option>
            <option value="France">France</option>
        </select>

        State:
        <select name="State">
                <optgroup label="UP">
                <option value="Agra" selected >Agra</option>
                 <option value="Alabama">Kanpur</option>
                 <option value="Nrmandie">Etawah </option>
            </optgroup>
             <optgroup label="Punjab">
                <option value="Amritsar" selected >Amritsar</option>
                 <option value="Ludhiyana">Ludhiyana</option>
                 <option value="Jalandhar">Jalandhar </option>
            </optgroup>
        </select>

        <input type="range" min="0" max="10" value="2" step="3" name="skLevel">


        <input type="date">
        <input type="time">

        <br><br>
        <input type="submit">
    </form>
</body>
</html>
